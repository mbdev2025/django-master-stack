<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linky Monitor | {% block title %}Dashboard{% endblock %}</title>
    {% load static %}
    <!-- Medium Design System -->
    <link rel="stylesheet" href="{% static 'styles/main.css' %}">
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @media print {

            .no-print,
            nav,
            .btn-neon,
            #loading-overlay,
            .range-btn,
            .badge,
            .nav-link {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <a href="/" class="brand" style="text-decoration: none;">⚡ Linky Monitor</a>
            <nav class="no-print">
                <a href="{% url 'dashboard-client' %}" class="nav-link">Espace (Particulier)</a>
                <a href="{% url 'pro-landing' %}" class="nav-link">Espace Pro (Installateur)</a>
            </nav>
        </header>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
    {% block extra_js %}{% endblock %}
</body>

</html>
